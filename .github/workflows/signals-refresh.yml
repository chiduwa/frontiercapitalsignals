name: Signals Refresh

# Runs the Frontier Capital Signals engine (signals-worker/) hourly and
# writes the result into the signals-worker Cloudflare Worker's KV cache.
# Kept separate from deploy.yml (which ships the Next.js app) since this
# job runs on every hour regardless of whether any code changed.
on:
  # :13 past the hour, not :00 — GitHub's own docs warn that exactly-on-the-
  # hour schedules queue heavily since every repo on GitHub with a similar
  # cron fires at that same instant. Confirmed live: over the first ~41h,
  # this ran only 28 times instead of the ~41 hourly firings intended (gaps
  # up to 3h+), which directly slowed the reliability-learning accumulation
  # rate — no run actually failed, every single one succeeded, so this was
  # pure scheduling contention, not a bug in the job itself.
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:

concurrency:
  # This run touches shared state (D1, KV) and now takes ~10-11 minutes;
  # if a delayed firing ever overlaps the next hour's, queue rather than
  # run both at once against the same tables/cache.
  group: signals-refresh
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Bumped from 20: the crypto history fetch now pulls up to ~2000 daily
    # bars per coin (was ~210) and stocks fetch 10y (was 1y) for the new
    # dwell/seasonal techniques, so each of the ~160 sequential/pooled
    # requests carries a bigger response — expect build time to grow
    # somewhat from the ~10-11 min baseline. Still well under the hourly
    # cadence either way.
    timeout-minutes: 28
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build signals payload and push to KV
        working-directory: signals-worker
        run: node scripts/build-signals.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FCS_KV_NAMESPACE_ID: ${{ vars.FCS_KV_NAMESPACE_ID }}
          FCS_D1_DATABASE_ID: ${{ vars.FCS_D1_DATABASE_ID }}
          TREFIS_OVERRIDES: ${{ vars.TREFIS_OVERRIDES }}
