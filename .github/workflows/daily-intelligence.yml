name: Daily Intelligence Generation

on:
  schedule:
    # 7:00 AM UTC daily (adjust to your preferred time)
    - cron: "0 7 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate daily intelligence
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
        run: node scripts/generate-intelligence.mjs

      - name: Commit new intelligence posts
        run: |
          git config --global user.name "FCS Intelligence Bot"
          git config --global user.email "bot@frontiercapitalsignals.com"
          git add content/intelligence/
          git diff --staged --quiet || git commit -m "chore: daily intelligence update $(date +%Y-%m-%d)"
          git push
