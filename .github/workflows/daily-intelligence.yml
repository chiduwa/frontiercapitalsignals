name: Daily Intelligence Generation

on:
  schedule:
    - cron: "0 7 * * *"   # 7:00 AM UTC daily
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate daily intelligence
        # A quota/RSS hiccup here should never block deploys of unrelated code
        # changes — deploy now lives in its own push-triggered workflow
        # (deploy.yml) that doesn't depend on this step succeeding.
        continue-on-error: true
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/generate-intelligence.mjs

      - name: Commit new posts
        run: |
          git config --global user.name "FCS Intelligence Bot"
          git config --global user.email "bot@frontiercapitalsignals.com"
          git add content/intelligence/
          git diff --staged --quiet || git commit -m "chore: daily intelligence update $(date +%Y-%m-%d)"
          git push
